<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
 
    <style>
        body {
            background: linear-gradient(135deg, #8ec5fc, #e0c3fc);
            font-family: "Poppins", sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 30px 40px;
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            width: 350px;
            text-align: center;
        }

        .container h1 {
            color: #4a00e0;
            margin-bottom: 20px;
        }

        .bish {
            display: flex;
            justify-content: center;
            margin-bottom: 15px;
        }

        #input {
            width: 70%;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #ccc;
            font-size: 16px;
        }

        #submitBtn {
            background: #4a00e0;
            color: white;
            border: none;
            border-radius: 10px;
            padding: 10px 15px;
            margin-left: 10px;
            cursor: pointer;
            transition: 0.3s;
        }

        #submitBtn:hover {
            background: #8e2de2;
        }

        .output {
            margin-top: 20px;
            text-align: left;
            max-height: 200px;
            overflow-y: auto;
        }

        .task {
            background: #f3f3f3;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 8px;
            transition: 0.3s;
        }

        .task:hover {
            background: #d8c7ff;
        }

        #removeBtn {
            background: crimson;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 15px;
            transition: 0.3s;
        }

        #removeBtn:hover {
            background: darkred;
        }
    </style>

    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>

<body>

    <div class="container">
        <h1>My To-Do List</h1>

         ">
            <input type="text" id="input" placeholder="Enter your task...">
            <button id="submitBtn">Add</button>
        </div>

      
 
    <script>
        $(document).ready(function() {
            $("#submitBtn").click(function() {
                let text = $("#input").val().trim();
                if (text !== "") {
                    $(".output").prepend("<p class='task'>" + text + "</p>");
                    $("#input").val(""); 
                }
            });

            $("#removeBtn").click(function() {
                $(".output").empty();
            });
        });
    </script>

</body>
</html>
